<!DOCTYPE html>
<html>
<head>
    <title>HackQuest — Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --green:#00ff9d; --cyan:#00e5ff; --bg:#020408; --card:#060d14; --border:#0a2a1f; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:var(--bg); color:var(--green);
            font-family:'Share Tech Mono',monospace;
            min-height:100vh; display:flex;
            justify-content:center; align-items:center;
        }
        body::before {
            content:''; position:fixed; inset:0;
            background-image:
                linear-gradient(rgba(0,255,157,0.03) 1px,transparent 1px),
                linear-gradient(90deg,rgba(0,255,157,0.03) 1px,transparent 1px);
            background-size:40px 40px; pointer-events:none; z-index:0;
        }
        .box {
            position:relative; z-index:1;
            background:var(--card); border:1px solid var(--border);
            border-radius:16px; padding:44px 40px;
            width:440px; text-align:center;
            animation:fadeUp 0.5s ease both;
        }
        .logo { font-family:'Orbitron',monospace; font-size:20px; font-weight:900; letter-spacing:3px; margin-bottom:24px; }
        .logo span { color:var(--cyan); }
        .big-icon { font-size:60px; margin-bottom:16px; }
        h2 { font-family:'Orbitron',monospace; font-size:20px; color:#fff; margin-bottom:8px; }
        .sub { color:#334; font-size:13px; margin-bottom:32px; }
        .section-label { font-size:11px; color:#555; letter-spacing:2px; text-transform:uppercase; margin-bottom:10px; text-align:left; }
        .pills { display:flex; gap:8px; margin-bottom:24px; flex-wrap:wrap; }
        .pill {
            flex:1; padding:10px 8px; border-radius:8px; cursor:pointer;
            background:#020408; border:1px solid var(--border);
            color:#446; font-family:'Share Tech Mono',monospace;
            font-size:12px; transition:all 0.2s; text-align:center;
        }
        .pill:hover { border-color:rgba(0,255,157,0.4); color:var(--green); background:rgba(0,255,157,0.05); }
        .pill.active { background:rgba(0,255,157,0.1); border-color:var(--green); color:var(--green); }
        .pill input { display:none; }
        .start-btn {
            width:100%; padding:14px; border-radius:10px;
            background:rgba(0,255,157,0.1); border:1px solid rgba(0,255,157,0.4);
            color:var(--green); font-family:'Share Tech Mono',monospace;
            font-size:15px; font-weight:bold; cursor:pointer;
            letter-spacing:2px; transition:all 0.2s; margin-top:8px;
        }
        .start-btn:hover { background:rgba(0,255,157,0.2); border-color:var(--green); }
        .back { color:#334; font-size:12px; display:block; margin-top:18px; text-decoration:none; transition:color 0.2s; }
        .back:hover { color:#aaa; }
        .info-row { display:flex; justify-content:center; gap:16px; margin-bottom:28px; }
        .info-chip { font-size:11px; color:#446; background:#020408; border:1px solid var(--border); padding:4px 12px; border-radius:20px; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    </style>
    <script>
        function selectPill(group, el) {
            document.querySelectorAll('.pill-' + group).forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            el.querySelector('input').checked = true;
        }
    </script>
</head>
<body>
<div class="box">
    <div class="logo">HACK<span>QUEST</span></div>
    <div class="big-icon">🎮</div>
    <h2>QUIZ BATTLE</h2>
    <p class="sub">5 random questions · earn up to 250 XP</p>

    <div class="info-row">
        <span class="info-chip">⚡ 50 XP per answer</span>
        <span class="info-chip">🎲 Random each time</span>
    </div>

    <form method="POST" action="/quiz/start">

        <p class="section-label">Choose Topic</p>
        <div class="pills">
            <label class="pill pill-topic active" onclick="selectPill('topic',this)">
                <input type="radio" name="topic" value="random" checked>🎲 Random
            </label>
            <label class="pill pill-topic" onclick="selectPill('topic',this)">
                <input type="radio" name="topic" value="web">🌐 Web
            </label>
            <label class="pill pill-topic" onclick="selectPill('topic',this)">
                <input type="radio" name="topic" value="crypto">🔐 Crypto
            </label>
            <label class="pill pill-topic" onclick="selectPill('topic',this)">
                <input type="radio" name="topic" value="network">🌍 Network
            </label>
        </div>

        <p class="section-label">Choose Difficulty</p>
        <div class="pills">
            <label class="pill pill-diff active" onclick="selectPill('diff',this)">
                <input type="radio" name="difficulty" value="mixed" checked>⚡ Mixed
            </label>
            <label class="pill pill-diff" onclick="selectPill('diff',this)">
                <input type="radio" name="difficulty" value="easy">🟢 Easy
            </label>
            <label class="pill pill-diff" onclick="selectPill('diff',this)">
                <input type="radio" name="difficulty" value="medium">🟡 Medium
            </label>
            <label class="pill pill-diff" onclick="selectPill('diff',this)">
                <input type="radio" name="difficulty" value="hard">🔴 Hard
            </label>
        </div>

        <button type="submit" class="start-btn">🚀 START QUIZ</button>
    </form>

    <a href="/dashboard" class="back">← Back to Dashboard</a>
</div>
</body>
</html>
