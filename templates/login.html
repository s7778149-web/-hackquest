<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HackQuest — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #00ff88; --green-dim: #00cc6a; --green-glow: #00ff8844;
      --bg: #020c06; --panel: #040f08cc; --border: #00ff8833;
      --text: #b8ffd6; --muted: #3a6650; --red: #ff3366;
      --font-mono: 'Share Tech Mono', monospace;
      --font-display: 'Orbitron', sans-serif;
    }
    html, body { height:100%; background:var(--bg); color:var(--text); font-family:var(--font-mono); overflow:hidden; }
    #matrix-canvas { position:fixed; inset:0; z-index:0; opacity:0.18; }
    body::after { content:''; position:fixed; inset:0; z-index:1; background:repeating-linear-gradient(to bottom,transparent 0px,transparent 2px,rgba(0,0,0,0.15) 2px,rgba(0,0,0,0.15) 4px); pointer-events:none; }
    .glow-orb { position:fixed; width:600px; height:600px; border-radius:50%; background:radial-gradient(circle,#00ff8818 0%,transparent 70%); top:50%; left:50%; transform:translate(-50%,-50%); z-index:0; animation:pulse-orb 4s ease-in-out infinite; }
    @keyframes pulse-orb { 0%,100%{opacity:0.6;transform:translate(-50%,-50%) scale(1)} 50%{opacity:1;transform:translate(-50%,-50%) scale(1.08)} }
    .page { position:relative; z-index:2; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:24px; gap:32px; }
    .brand { text-align:center; animation:fade-down 0.7s ease both; }
    .brand-name { font-family:var(--font-display); font-size:clamp(2rem,6vw,3.5rem); font-weight:900; letter-spacing:0.15em; color:var(--green); text-shadow:0 0 10px var(--green),0 0 40px var(--green-glow),0 0 80px var(--green-glow); animation:glitch 5s infinite; }
    .brand-sub { font-size:0.78rem; color:var(--muted); letter-spacing:0.25em; margin-top:6px; text-transform:uppercase; }
    @keyframes glitch {
      0%,94%,100%{text-shadow:0 0 10px var(--green),0 0 40px var(--green-glow);clip-path:none;transform:none}
      95%{clip-path:inset(20% 0 60% 0);transform:translate(-3px,0);text-shadow:2px 0 var(--red)}
      96%{clip-path:inset(60% 0 10% 0);transform:translate(3px,0);text-shadow:-2px 0 #00cfff}
      97%{clip-path:none;transform:none}
    }
    .card { width:100%; max-width:420px; background:var(--panel); border:1px solid var(--border); border-radius:4px; padding:40px 36px; backdrop-filter:blur(16px); box-shadow:0 0 0 1px #00ff8811,0 8px 40px #000a,inset 0 1px 0 #00ff8822; animation:fade-up 0.7s 0.15s ease both; position:relative; overflow:hidden; }
    .card::before,.card::after { content:''; position:absolute; width:20px; height:20px; border-color:var(--green); border-style:solid; opacity:0.6; }
    .card::before { top:10px; left:10px; border-width:2px 0 0 2px; }
    .card::after  { bottom:10px; right:10px; border-width:0 2px 2px 0; }
    .card-title { font-size:0.72rem; letter-spacing:0.3em; color:var(--green-dim); text-transform:uppercase; margin-bottom:28px; display:flex; align-items:center; gap:10px; }
    .card-title::before { content:''; display:block; height:1px; width:24px; background:var(--green-dim); opacity:0.5; }
    .field { margin-bottom:18px; }
    label { display:block; font-size:0.7rem; letter-spacing:0.2em; color:var(--muted); text-transform:uppercase; margin-bottom:8px; }
    .input-wrap { position:relative; display:flex; align-items:center; }
    .input-icon { position:absolute; left:14px; font-size:0.9rem; color:var(--muted); pointer-events:none; transition:color 0.2s; }
    input { width:100%; padding:12px 14px 12px 40px; background:#00100600; border:1px solid var(--border); border-radius:3px; color:var(--green); font-family:var(--font-mono); font-size:0.95rem; outline:none; transition:border-color 0.2s,box-shadow 0.2s,background 0.2s; caret-color:var(--green); }
    input::placeholder { color:var(--muted); opacity:0.5; }
    input:focus { border-color:var(--green); background:#00ff8806; box-shadow:0 0 0 2px var(--green-glow),inset 0 0 12px #00ff880a; }
    .input-wrap:focus-within .input-icon { color:var(--green); }
    .btn { width:100%; margin-top:28px; padding:14px; background:transparent; border:1px solid var(--green); border-radius:3px; color:var(--green); font-family:var(--font-display); font-size:0.85rem; font-weight:700; letter-spacing:0.25em; text-transform:uppercase; cursor:pointer; position:relative; overflow:hidden; transition:color 0.25s,box-shadow 0.25s; }
    .btn::before { content:''; position:absolute; inset:0; background:var(--green); transform:translateX(-101%); transition:transform 0.3s cubic-bezier(.4,0,.2,1); z-index:0; }
    .btn:hover::before { transform:translateX(0); }
    .btn:hover { color:var(--bg); box-shadow:0 0 24px var(--green-glow); }
    .btn span { position:relative; z-index:1; }
    .error-msg { display:none; margin-top:14px; padding:10px 14px; background:#ff336611; border:1px solid #ff336644; border-radius:3px; color:var(--red); font-size:0.78rem; letter-spacing:0.05em; }
    .error-msg.show { display:block; animation:shake 0.35s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
    .divider { display:flex; align-items:center; gap:12px; margin-top:28px; color:var(--muted); font-size:0.7rem; letter-spacing:0.15em; opacity:0.6; }
    .divider::before,.divider::after { content:''; flex:1; height:1px; background:var(--border); }
    .signup-link { display:block; margin-top:16px; text-align:center; font-size:0.78rem; color:var(--muted); letter-spacing:0.1em; }
    .signup-link a { color:var(--green); text-decoration:none; font-weight:bold; transition:text-shadow 0.2s; }
    .signup-link a:hover { text-shadow:0 0 8px var(--green); }
    .status-bar { font-size:0.65rem; color:var(--muted); letter-spacing:0.15em; opacity:0.5; display:flex; gap:20px; animation:fade-up 0.7s 0.4s ease both; }
    .status-bar span { display:flex; align-items:center; gap:5px; }
    .dot { width:6px; height:6px; border-radius:50%; background:var(--green); animation:blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
    @keyframes fade-down { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fade-up   { from{opacity:0;transform:translateY(20px)}  to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>
<canvas id="matrix-canvas"></canvas>
<div class="glow-orb"></div>
<div class="page">

  <div class="brand">
    <div class="brand-name">HACKQUEST</div>
    <div class="brand-sub">Capture The Flag Platform</div>
  </div>

  <div class="card">
    <div class="card-title">Authenticate</div>

    <!-- FLASK FORM — works with your backend -->
    <form method="POST" action="/login" id="login-form" onsubmit="handleLogin()">

      <div class="field">
        <label for="username">Username</label>
        <div class="input-wrap">
          <input id="username" name="username" type="text" placeholder="agent@hackquest" autocomplete="username" required />
          <span class="input-icon">▸</span>
        </div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input id="password" name="password" type="password" placeholder="••••••••••••" autocomplete="current-password" required />
          <span class="input-icon">🔒</span>
        </div>
      </div>

      <button class="btn" type="submit" id="login-btn">
        <span id="btn-text">Login →</span>
      </button>

      <!-- Flask error message -->
      {% if error %}
      <div class="error-msg show">⚠ {{ error }}</div>
      {% endif %}

    </form>

    <div class="divider">OR</div>
    <div class="signup-link">No account? <a href="/signup">Sign Up here</a></div>
  </div>

  <div class="status-bar">
    <span><span class="dot"></span> SYSTEM ONLINE</span>
    <span>TLS 1.3 SECURED</span>
    <span>v2.4.1</span>
  </div>

</div>

<script>
  /* MATRIX RAIN */
  const canvas = document.getElementById('matrix-canvas');
  const ctx = canvas.getContext('2d');
  let cols, drops;
  function initMatrix() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    cols  = Math.floor(canvas.width / 14);
    drops = Array(cols).fill(1);
  }
  function drawMatrix() {
    ctx.fillStyle = 'rgba(2,12,6,0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#00ff88';
    ctx.font = '14px Share Tech Mono';
    const chars = '01アイウエオカキクケコ{}<>[]//\\';
    drops.forEach((y, i) => {
      const ch = chars[Math.floor(Math.random() * chars.length)];
      ctx.fillText(ch, i * 14, y * 14);
      if (y * 14 > canvas.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    });
  }
  initMatrix();
  window.addEventListener('resize', initMatrix);
  setInterval(drawMatrix, 50);

  /* LOADING ANIMATION ON SUBMIT */
  function handleLogin() {
    const btn = document.getElementById('login-btn');
    const txt = document.getElementById('btn-text');
    btn.disabled = true;
    txt.textContent = 'Authenticating...';
  }
</script>
</body>
</html>
