<!DOCTYPE html>
<html>
<head>
    <title>HackQuest — Result</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; color: #00ff9d; font-family: monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .box { background: #0d0d1a; border: 1px solid #1a1a3a; border-radius: 12px; padding: 48px 40px; width: 380px; text-align: center; }
        .score { font-size: 52px; font-weight: 900; color: #00ff9d; margin: 16px 0; }
        .xp { color: #00ccff; font-size: 18px; margin-bottom: 32px; }
        .btn { display: inline-block; padding: 12px 24px; border-radius: 8px; font-family: monospace; font-weight: bold; text-decoration: none; margin: 6px; }
        .green  { background: #00ff9d22; border: 1px solid #00ff9d; color: #00ff9d; }
        .red    { background: #ff446622; border: 1px solid #ff4466; color: #ff4466; }
    </style>
</head>
<body>
<div class="box">
    {% if score == total %}
        <div style="font-size:64px">🏆</div>
        <h2 style="color:#00ff9d; margin-top:12px">PERFECT SCORE!</h2>
    {% elif score >= total // 2 %}
        <div style="font-size:64px">🎯</div>
        <h2 style="color:#ffaa00; margin-top:12px">Good Job!</h2>
    {% else %}
        <div style="font-size:64px">💀</div>
        <h2 style="color:#ff4466; margin-top:12px">Keep Practicing!</h2>
    {% endif %}

    <div class="score">{{ score }} / {{ total }}</div>
    <div class="xp">⚡ +{{ xp_earned }} XP Earned!</div>

    <a href="/quiz"       class="btn red">🔄 Try Again</a>
    <a href="/dashboard"  class="btn green">🏠 Dashboard</a>
</div>
</body>
</html>
